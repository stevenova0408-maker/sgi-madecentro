<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos - SGI Madecentro</title>

<style>
body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #ffffff, #fff4e6);
margin: 0;
padding: 0;
color: #111827;
}

header {
background: #ff7a00;
padding: 18px 30px;
display: flex;
align-items: center;
justify-content: space-between;
box-shadow: 0px 4px 10px rgba(0,0,0,0.15);
}

header img { height: 55px; }

header h1 {
margin: 0;
font-size: 22px;
color: white;
font-weight: bold;
}

.container {
padding: 25px;
max-width: 1400px;
margin: auto;
}

.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.card {
background: white;
padding: 18px;
border-radius: 14px;
margin-bottom: 18px;
box-shadow: 0px 4px 10px rgba(0,0,0,0.08);
border-left: 6px solid #ff7a00;
}

button {
padding: 12px 18px;
font-size: 15px;
cursor: pointer;
background: #ff7a00;
border: none;
border-radius: 8px;
color: white;
font-weight: bold;
margin-top: 8px;
}

button:hover { background: #e56d00; }

button:disabled {
background: #9ca3af;
cursor: not-allowed;
}

input {
padding: 12px;
width: 100%;
max-width: 350px;
font-size: 15px;
border-radius: 8px;
border: 2px solid #d1d5db;
outline: none;
box-sizing: border-box;
}

input:focus { border: 2px solid #ff7a00; }

.pedido-item {
padding: 12px;
border-bottom: 1px solid #eee;
}

.pedido-item:last-child { border-bottom: none; }

.pedido-item b { color: #ff7a00; }

.semaforo {
font-weight: bold;
padding: 6px 10px;
border-radius: 8px;
display: inline-block;
color: white;
font-size: 13px;
}

.rojo { background: #dc2626; }
.amarillo { background: #f59e0b; }
.verde { background: #16a34a; }

.btn-secondary { background: #111827; }
.btn-secondary:hover { background: #000000; }

.btn-entrega { background: #16a34a; }
.btn-entrega:hover { background: #15803d; }

.msg { margin-top: 10px; font-weight: bold; }

.admin-box {
margin-top: 20px;
padding: 12px;
border-radius: 10px;
background: #fff4e6;
border: 1px solid #ff7a00;
}

.divider {
height: 1px;
background: #eee;
margin: 15px 0;
}

.mini {
font-size: 13px;
color: #6b7280;
}

.paginacion {
margin-top: 15px;
text-align: center;
}
</style>
</head>

<body>

<header>
<img src="/static/logo.png" alt="Madecentro">
<h1>SGI - Pedidos Cargados</h1>

<div style="display:flex; gap:10px;">
<button class="btn-secondary" onclick="window.location.href='/dashboard'">📊 Dashboard</button>
<button class="btn-secondary" onclick="window.location.href='/login'">🏭 Cambiar Planta</button>
<button class="btn-secondary" onclick="window.location.href='/logout'">🔓 Cerrar Sesión</button>
</div>
</header>

<div class="container">

<div class="card">
<h3>📥 Cargar Pedido (Excel)</h3>
<p class="mini">Cargue el archivo Excel exportado desde el sistema para registrar piezas y paquetes.</p>

<input type="file" id="archivoExcel" accept=".xlsx">
<button onclick="subirExcel()">Cargar Excel</button>

<p id="mensaje_excel" class="msg"></p>
</div>

<div class="grid">

<div class="card">
<div class="titulo-seccion">📦 Pedidos Disponibles (Producción)</div>
<div id="lista_pedidos"></div>
</div>

<div class="card">

<div class="titulo-seccion">🏭 Pedidos para Entrega al CEDI</div>

<div style="display:flex;gap:10px;margin-top:10px;margin-bottom:10px;font-weight:bold">

<div style="background:#16a34a;color:white;padding:6px 12px;border-radius:8px">
🟢 <span id="cedi_verde">0</span>
</div>

<div style="background:#f59e0b;color:white;padding:6px 12px;border-radius:8px">
🟠 <span id="cedi_naranja">0</span>
</div>

<div style="background:#dc2626;color:white;padding:6px 12px;border-radius:8px">
🔴 <span id="cedi_rojo">0</span>
</div>

</div>

<div id="lista_entrega"></div>

</div>

</div>

<script>

const tamañoPagina = 5;

async function cargarEntrega(page = 1) {

let res = await fetch(`/api/pedidos_entrega?page=${page}&size=${tamañoPagina}`);
if (!res.ok) return;

let response = await res.json();
let data = response.data || [];
let totalPaginas = response.total_paginas || 1;

let verde = 0;
let naranja = 0;
let rojo = 0;

data.forEach(p => {
if (p.semaforo === "VERDE") verde++;
if (p.semaforo === "NARANJA") naranja++;
if (p.semaforo === "ROJO") rojo++;
});

let v = document.getElementById("cedi_verde");
let n = document.getElementById("cedi_naranja");
let r = document.getElementById("cedi_rojo");

if (v) v.innerText = verde;
if (n) n.innerText = naranja;
if (r) r.innerText = rojo;

let htmlEntrega = "";

if (data.length === 0) {

htmlEntrega = "<p>📭 No hay pedidos listos para entrega.</p>";

} else {

data.forEach(p => {

let claseSemaforo =
p.semaforo === "VERDE" ? "verde" :
p.semaforo === "NARANJA" ? "amarillo" : "rojo";

htmlEntrega += `
<div class="pedido-item">

<p><b>Pedido:</b> ${p.numero_pedido}</p>

<p><b>Cliente:</b> ${p.cliente}</p>

<p><b>Fecha ingreso CEDI:</b> ${p.fecha_entrada_cedi ?? "-"}</p>

<p>
<span class="semaforo ${claseSemaforo}">
${p.semaforo ?? "-"}
</span>
</p>

<button class="btn-entrega"
onclick="window.location.href='/entrega_cedi/${p.id}'">
🚀 Iniciar Entrega CEDI
</button>

</div>
`;
});

htmlEntrega += `
<div class="paginacion">
<button ${page === 1 ? "disabled" : ""} onclick="cargarEntrega(${page - 1})">⬅</button>
Página ${page} de ${totalPaginas}
<button ${page >= totalPaginas ? "disabled" : ""} onclick="cargarEntrega(${page + 1})">➡</button>
</div>
`;

}

document.getElementById("lista_entrega").innerHTML = htmlEntrega;

}

cargarEntrega(1);

</script>

</body>
</html>
